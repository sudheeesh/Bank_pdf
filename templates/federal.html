<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  font-size:12px;
  color:#000;
}

.header{
  text-align:center;
  font-weight:bold;
  font-size:18px;
  margin-bottom:10px;
}

.info{
  margin-bottom:15px;
}

.info table{
  width:100%;
}

table.statement{
  width:100%;
  border-collapse:collapse;
}

.statement th{
  border:1px solid #000;
  padding:6px;
  background:#f2f2f2;
}

.statement td{
  border:1px solid #000;
  padding:6px;
}

.right{ text-align:right; }
.center{ text-align:center; }

.footer{
  margin-top:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="header">FEDERAL BANK LTD</div>

<div class="info">
<table>
<tr><td>Account Name</td><td>: {{accountName}}</td></tr>
<tr><td>Account Number</td><td>: {{accountNumber}}</td></tr>
<tr><td>Branch</td><td>: {{branch}}</td></tr>
<tr><td>Opening Balance</td><td>: {{opening}}</td></tr>
<tr><td>Closing Balance</td><td>: {{closing}}</td></tr>
</table>
</div>

<table class="statement">
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th class="right">Debit</th>
<th class="right">Credit</th>
<th class="right">Balance</th>
</tr>
</thead>

<tbody>
{{rows}}
</tbody>
</table>

<div class="footer">
*** END OF STATEMENT ***
</div>

</body>
</html>
