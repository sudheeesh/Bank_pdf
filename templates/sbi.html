<html>
<head>
<style>
body{font-family:Arial;font-size:12px;padding:40px}
table{width:100%;border-collapse:collapse}
th,td{border-bottom:1px solid #ccc;padding:6px}
.header{margin-bottom:20px}
</style>
</head>
<body>

<div class="header">
<h2>STATE BANK OF INDIA</h2>
<p>Name: {{accountName}}</p>
<p>Account No: {{accountNumber}}</p>
<p>Branch: {{branch}}</p>
<p>Opening Balance: {{opening}}</p>
<p>Closing Balance: {{closing}}</p>
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Description</th>
<th>Debit</th>
<th>Credit</th>
<th>Balance</th>
</tr>
</thead>
<tbody>
{{rows}}
</tbody>
</table>

</body>
</html>
